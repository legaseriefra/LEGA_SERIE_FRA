<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lega Serie Fra - Fantacalcio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #121824;
            color: #ffffff;
            padding-bottom: 80px; /* Spazio per la barra di navigazione */
        }

        /* Intestazione del sito */
        header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 3px solid #38bdf8;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #38bdf8;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* Contenitore Principale */
        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Griglia delle Società */
        .squadre-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .squadra-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid #334155;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .squadra-card:active {
            transform: scale(0.97);
            border-color: #38bdf8;
        }

        .squadra-logo {
            width: 70px;
            height: 70px;
            background-color: #334155;
            border-radius: 50%;
            margin: 0 auto 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 2px solid #475569;
        }

        .squadra-nome {
            font-size: 15px;
            font-weight: 600;
            color: #f8fafc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .squadra-presidente {
            font-size: 12px;
            color: #38bdf8;
            margin-top: 2px;
        }

        /* Barra di Navigazione Inferiore (Stile App) */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: #0f172a;
            border-top: 1px solid #334155;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
        }

        .nav-item.active {
            color: #38bdf8;
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>LEGA SERIE FRA</h1>
        <p>Stagione Ufficiale Fantacalcio</p>
    </header>

    <div class="container">
        <h2 class="section-title">Società Partecipanti</h2>
        
        <div class="squadre-grid">
            
            <div class="squadra-card">
                <div class="squadra-logo">🏆</div>
                <div class="squadra-nome">Stanciu di Vincere</div>
                <div class="squadra-presidente">Pres. Stanciu</div>
            </div>

            <div class="squadra-card">
                <div class="squadra-logo">🐺</div>
                <div class="squadra-nome">Iena Team</div>
                <div class="squadra-presidente">Pres. Iena</div>
            </div>

            <div class="squadra-card">
                <div class="squadra-logo">⚽</div>
                <div class="squadra-nome">FC Pippo</div>
                <div class="squadra-presidente">Pres. Pippo</div>
            </div>

            <div class="squadra-card">
                <div class="squadra-logo">💎</div>
                <div class="squadra-nome">Team Serietà</div>
                <div class="squadra-presidente">Pres. Max</div>
            </div>

        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active">
            <span class="nav-icon">🛡️</span>
            <span>Società</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">📊</span>
            <span>Classifica</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">🧮</span>
            <span>Simulatore</span>
        </a>
    </nav>

</body>
</html>
