<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lega Serie Fra</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #121824; color: #ffffff; padding-bottom: 80px; }
        
        /* Header */
        header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 20px; text-align: center; border-bottom: 3px solid #38bdf8; position: sticky; top: 0; z-index: 100; }
        header h1 { font-size: 22px; color: #38bdf8; font-weight: 700; }
        header p { font-size: 12px; color: #94a3b8; margin-top: 3px; }
        
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .section-title { font-size: 16px; margin-bottom: 15px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: space-between; }
        
        /* Pagine/Schermate */
        .page { display: none; }
        .page.active { display: block; }
        
        /* Griglia Società */
        .squadre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .squadra-card { background-color: #1e293b; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #334155; cursor: pointer; transition: transform 0.2s; }
        .squadra-card:active { transform: scale(0.95); border-color: #38bdf8; }
        .squadra-logo { width: 60px; height: 60px; background-color: #334155; border-radius: 50%; margin: 0 auto 10px auto; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #475569; }
        .squadra-nome { font-size: 14px; font-weight: 600; color: #f8fafc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .squadra-presidente { font-size: 11px; color: #38bdf8; margin-top: 2px; }
        
        /* Dettaglio Società (Rosa + Palmares) */
        .btn-back { background-color: #334155; color: #f8fafc; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-bottom: 15px; }
        .info-box { background-color: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 15px; border-left: 4px solid #38bdf8; font-size: 13px; color: #e2e8f0; }
        
        /* Tabelle contratti e listino */
        .table-container { background-color: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th { background-color: #0f172a; padding: 10px; color: #94a3b8; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #334155; color: #f8fafc; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        
        /* Badge Ruoli Colorati richiesti */
        .badge-ruolo { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; color: #ffffff; text-transform: uppercase; text-align: center; min-width: 32px; }
        .ruolo-por { background-color: #f97316; } /* Arancione */
        .ruolo-dif { background-color: #22c55e; } /* Verde (B, Dc, Dd, Ds) */
        .ruolo-cen { background-color: #3b82f6; } /* Blu (E, M, C) */
        .ruolo-tre { background-color: #a855f7; } /* Viola (W, T) */
        .ruolo-att { background-color: #ef4444; } /* Rosso (A, Pc) */
        
        /* Palmares a Fisarmonica (Accordion) */
