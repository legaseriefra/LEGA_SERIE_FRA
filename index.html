<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lega Serie Fra</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #121824; color: #ffffff; padding-bottom: 80px; }
        header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 25px 20px; text-align: center; border-bottom: 3px solid #38bdf8; }
        header h1 { font-size: 24px; color: #38bdf8; font-weight: 700; }
        header p { font-size: 13px; color: #94a3b8; margin-top: 5px; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .section-title { font-size: 18px; margin-bottom: 15px; color: #94a3b8; text-transform: uppercase; }
        .squadre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .squadra-card { background-color: #1e293b; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #334155; }
        .squadra-logo { width: 70px; height: 70px; background-color: #334155; border-radius: 50%; margin: 0 auto 12px auto; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid #475569; }
        .squadra-nome { font-size: 15px; font-weight: 600; color: #f8fafc; }
        .squadra-presidente { font-size: 12px; color: #38bdf8; margin-top: 2px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background-color: #0f172a; border-top: 1px solid #334155; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; text-decoration: none; font-size: 11px; }
        .nav-item.active { color: #38bdf8; }
        .nav-icon { font-size: 20px; }
        .loading { text-align: center; color: #94a3b8; margin-top: 40px; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h1>LEGA SERIE FRA</h1>
        <p>Stagione Ufficiale Fantacalcio</p>
    </header>

    <div class="container">
        <h2 class="section-title">Società Partecipanti</h2>
        <div id="loading" class="loading">Caricamento società in corso...</div>
        <div class="squadre-grid" id="squadre-container"></div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><span class="nav-icon">🛡️</span><span>Società</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">📊</span><span>Classifica</span></a>
        <a href="#" class="nav-item"><span class="nav-icon">🧮</span><span>Simulatore</span></a>
    </nav>

    <script>
        // --- CONFIGURAZIONE GOOGLE SHEETS ---
        // Sostituisci la scritta qui sotto con l'ID del tuo foglio Google vero!
        const SPREADSHEET_ID = '1qpaYVBaGix4PvwxBmycbN8J_o5bq8hoxxFRZt5YMG9A';
        // Scrivi il nome esatto della scheda delle società (es: SOCIETA)
        const SHEET_NAME = 'SOCIETA'; 

        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

        fetch(url)
            .then(res => res.text())
            .then(data => {
                // Pulizia del file JSON inviato da Google
                const jsonText = data.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1];
                const jsonData = JSON.parse(jsonText);
                const rows = jsonData.table.rows;
                
                const container = document.getElementById('squadre-container');
                document.getElementById('loading').style.display = 'none';

                // Leggiamo le righe del foglio (saltando la prima riga delle intestazioni)
                rows.forEach((row, index) => {
                    // ATTENZIONE: row.c[0] è la prima colonna, row.c[1] la seconda, ecc.
                    // Modifica i numeri tra le quadre in base a dove si trovano Nome Squadra e Presidente nel tuo foglio!
                    const nomeSquadra = row.c[0] ? row.c[0].v : 'Sconosciuta';
                    const presidente = row.c[1] ? row.c[1].v : 'Nessuno';

                    const card = document.createElement('div');
                    card.className = 'squadra-card';
                    card.innerHTML = `
                        <div class="squadra-logo">⚽</div>
                        <div class="squadra-nome">${nomeSquadra}</div>
                        <div class="squadra-presidente">Pres. ${presidente}</div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('loading').innerText = "Errore nel caricamento dei dati. Controlla la configurazione.";
                console.error(err);
            });
    </script>
</body>
</html>
